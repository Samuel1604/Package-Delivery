<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Package Delivery</title>
  </head>
  <body>
    <main>
      <form action="">
        <label for="destination">Destination</label>
        <input
          type="text"
          id="destination"
          placeholder="Enter your package destination here"
        />
        <label for="weight"> Package Weight </label>
        <input
          type="text"
          id="weight"
          placeholder="Enter your package weight"
        />
        <input type="checkbox" name="delivery" id="delivery">
        <label for="delivery">Express Delivery</label>
        <button type="button" id="submit">Submit</button>
      </form>
      <h3 id="sum"></h3>
    </main>
    <footer></footer>
  </body>
  <script src="script.js"></script>
</html>
